<!-- https://techtrail.net/creating-an-interactive-map-with-leaflet-js/ -->
<!DOCTYPE html>
<html style="height: 100%;">

<head>
  <title>Fantasy World Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="leaflet.css" />
  <script src="leaflet.js"></script>
</head>

<body style="height: 100%; margin: 0;">
  <div id="map" style="width: 100%; height: 100%; background: #6a8abb;"></div>
  <script>
    // =========================
    // USTAWIENIA
    // =========================
    const mapWidth = 15360;
    const mapHeight = 15360;
    const tileSize = 256;
    const maxZoom = 6;

    const map = L.map("map", {
      crs: L.CRS.Simple,
      minZoom: 2,
      maxZoom: maxZoom,
      noWrap: true,
    });

    const southWest = map.unproject([0, mapHeight], maxZoom);
    const northEast = map.unproject([mapWidth, 0], maxZoom);
    const bounds = new L.LatLngBounds(southWest, northEast);
    map.setMaxBounds(bounds);
    map.fitBounds(bounds);

    const tileLayer = L.tileLayer("map/{z}/{z}_{x}_{y}.jpg", {
      tileSize: tileSize,
      maxZoom: maxZoom,
      minZoom: 0,
      noWrap: true,
      bounds: bounds,
    }).addTo(map);

    // =========================
    // IKONY
    // =========================
    const kingdomIcon = L.icon({
      iconUrl: "icons/kingdom.png",
      iconSize: [124, 124],
    });

    const cityIcon = L.icon({
      iconUrl: "icons/city.png",
      iconSize: [84, 84],
    });

    const villageIcon = L.icon({
      iconUrl: "icons/village.png",
      iconSize: [150, 150],
    });

    // =========================
    // WARSTWY
    // =========================
    const kingdomsLayer = L.layerGroup();
    const citiesLayer = L.layerGroup();
    const villagesLayer = L.layerGroup();

    // =========================
    // DANE (na sztywno – potem z API)
    // =========================

    function point(x, y) {
      return map.unproject([x, y], maxZoom);
    }

    // KRÓLESTWA
    L.marker(point(4686, 9550), { icon: kingdomIcon })
      .bindPopup("Królestwo Południa")
      .addTo(kingdomsLayer);

    L.marker(point(9534, 4447), { icon: kingdomIcon })
      .bindPopup("Królestwo Północy")
      .addTo(kingdomsLayer);

    // MIASTA
    L.marker(point(5082, 7764), { icon: cityIcon })
      .bindPopup("Miasto A")
      .addTo(citiesLayer);

    L.marker(point(8727, 5079), { icon: cityIcon })
      .bindPopup("Miasto B")
      .addTo(citiesLayer);

    // WSIE
    L.marker(point(9310, 4494), { icon: villageIcon })
      .bindPopup("Wieś X")
      .addTo(villagesLayer);

    L.marker(point(9646, 4729), { icon: villageIcon })
      .bindPopup("Wieś Y")
      .addTo(villagesLayer);

    // =========================
    // LOGIKA ZOOM
    // =========================

    function toggleLayer(layer, visible) {
      if (visible && !map.hasLayer(layer)) map.addLayer(layer);
      if (!visible && map.hasLayer(layer)) map.removeLayer(layer);
    }

    function updateLayers() {
      const z = map.getZoom();

      toggleLayer(kingdomsLayer, z <= 3);
      toggleLayer(citiesLayer, z > 3 && z <= 5);
      toggleLayer(villagesLayer, z > 5);
    }

    map.on("zoomend", updateLayers);
    updateLayers();

    // =========================
    // DEBUG marker (zostawiłem Twój)
    // =========================
    tileLayer.on('tileerror', e => console.warn("Tile error:", e.tile.src));
    tileLayer.on('tileloadstart', e => console.log("Loading tile:", e.tile.src));

    map.on("click", function (e) {
      console.log("PIXEL:", map.project(e.latlng, maxZoom));
    });

    const marker = L.marker([0, 0], { draggable: true }).addTo(map);
    marker.bindPopup("LatLng Marker").openPopup();
    marker.on("dragend", function () {
      marker.getPopup().setContent(marker.getLatLng().toString()).openOn(map);
    });
  </script>
</body>

</html>
